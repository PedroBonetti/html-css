<!DOCTYPE html>
<html lang="pt-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Listas Ordenadas</h1>
    <ol>
        <li>lista 1</li>
        <li>lista 2</li>
        <ol type="1" start="2">
            <li>Lista 2.1</li>    
        </ol>
        <li>lista 3</li>
        <ul>
            <li>Ponto</li>
        </ul>
        <li>lista 4</li>
        <li>lista 5</li>
        <li>lista 6</li>
    </ol>
    <h2>Listas Desordenadas</h2>
    <ul>
        <li>lista 1</li>
        <li>lista 2</li>
        <li>lista 3</li>
        <li>lista 4</li>
        <li>lista 5</li>
        <li>lista 6</li>
    </ul>
    <h2>Lista definicao</h2>
    <dl>
        <dt>Termo</dt>
        <dd>Termo e um</dd>
        <dt>Linguagem</dt>
        <dd>Linguagem eh um termo</dd>
    </dl>
</body>
</html>
