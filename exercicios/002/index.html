<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>
        Você pode escrever <br> <!-- A tag <p> é parágrafo, A tag <br> é break row, quebra de linha-->
        um parágrafo <br> de 
        qualquer &lt;jeito.&gt; <!--&lt e &gt é para fazer os símbolos < e > -->
        Basta colocar tudo
        no meio de par de tags
        p e /p
    </p>
    <p>
        Vamos botar símbolos:
        &reg;
        &Delta;
        &dagger;
    </p>
    <p>
        Vammos botar emojis:
         &#x1f596
    </p>
</body>
</html>
