<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        a {
            color: aqua;
            text-decoration: none;
            font-weight: 700;
        }

        a:visited{
            color: rgb(34, 168, 0);
        }

        a:hover {
            color: brown;
            text-decoration: underline;
        }

        a:active {
            color: black;
        }
        
        .especial::before {
            content: '-> ';
        }
        
        .especial::after {
            content: ' (link)';
            font-weight: 100;
        }

    </style>
</head>
<body>
    <h1>Links Personalizados</h1>
    <ul>
        <li><a href="https://www.google.com/" target="_blank">Link do Google</a></li>
        <li class="especial"><a href="https://www.google.com/" target="_blank">Link do Google</a></li>
        <li><a href="https://www.google.com/" target="_blank">Link do Google</a></li>
    </ul>
</body>
</html>
